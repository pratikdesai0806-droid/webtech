<HTML>
  <HEAD>
    <TITLE>Types_of_tags</TITLE>
  </HEAD>
  <BODY>
    <hr/>
    <LABEL>TEXT FIELD :</LABEL>
    <input type="text" name="txtname">
    <hr/>
    <LABEL>Checkbox :</LABEL>
    <input type="checkbox" name="chklang">kannada
    <input type="checkbox" name="chklang">hindi
    <input type="checkbox" name="chklang">english
    <hr/>
    <LABEL>Radio button :</LABEL>
    <input type="radio" name="Gender">male
    <input type="radio" name="Gender">female
    <hr/>
    <LABEL>Drop down menu :</LABEL>
    <select>
      <option>Karnataka</option>
      <option>Goa</option>
      <option>Maharastra</option>
      <option>Kerala</option>
    </select>
    <hr/>
    <LABEL>Text area :</LABEL>
    <textarea name="Textareaaddress"></textarea>
    <hr/>
    <LABEL>Submit button :</LABEL>
    <input type="submit" value="click here to submit" onclick="submitdata()">
    <hr/>
    <LABEL>Number field :</LABEL>
    <input type="number" name="txtnumber">
    <hr/>
    <LABEL>Upload a file :</LABEL>
    <input type="file" id="flbiodata" accept="image/png/pdf" multiple>
  </BODY>
</HTML>
